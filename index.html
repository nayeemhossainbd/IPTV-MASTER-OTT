<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTT Home</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}

/* header */
header{
  position:sticky;top:0;background:#000;padding:10px;
  display:flex;gap:10px;
}
input{flex:1;padding:10px;border:none;border-radius:6px}

/* category */
#cats{display:flex;overflow-x:auto;background:#1a1a1a;padding:8px}
.cat{padding:6px 12px;background:#333;margin-right:8px;border-radius:20px;cursor:pointer;white-space:nowrap}

/* grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
.card{background:#222;padding:8px;border-radius:10px;cursor:pointer}
.card img{width:100%;height:70px;object-fit:contain;background:#000}
.card p{font-size:12px;margin:6px 0 0}
</style>
</head>

<body>

<header>
  <input id="search" placeholder="Search channels...">
</header>

<div id="cats"></div>
<div id="content"></div>

<script>
const M3U_URL =
"https://cdn.jsdelivr.net/gh/nayeemhossainbd/IPTV-MASTER-OTT@main/channels.m3u";

let channels = [];

/* LOAD M3U */
fetch(M3U_URL)
.then(r=>r.text())
.then(t=>{
  channels = parseM3U(t);
  renderCategories();
  render(channels);
});

/* PARSER */
function parseM3U(data){
  const lines = data.split("\n");
  let arr = [];

  for(let i=0;i<lines.length;i++){
    if(lines[i].includes("#EXTINF")){
      const name = lines[i].split(",")[1] || "Unknown";
      const group = (lines[i].match(/group-title="(.*?)"/)||[])[1] || "Other";
      const logo = (lines[i].match(/tvg-logo="(.*?)"/)||[])[1] || "";
      const url = lines[i+1] || "";

      if(url.startsWith("http")){
        arr.push({name,group,logo,url});
      }
    }
  }
  return arr;
}

/* CATEGORIES */
function renderCategories(){
  const groups = [...new Set(channels.map(c=>c.group))];

  document.getElementById("cats").innerHTML =
    `<div class="cat" onclick="render(channels)">ALL</div>` +
    groups.map(g=>`
      <div class="cat" onclick="filterCat('${g}')">${g}</div>
    `).join("");
}

function filterCat(g){
  render(channels.filter(c=>c.group===g));
}

/* RENDER */
function render(list){
  let html = `<div class="grid">`;

  list.forEach(c=>{
    html += `
      <div class="card" onclick="openPlayer('${encodeURIComponent(c.url)}')">
        <img src="${c.logo}">
        <p>${c.name}</p>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
  const v = e.target.value.toLowerCase();
  render(channels.filter(c=>c.name.toLowerCase().includes(v)));
});

/* OPEN PLAYER */
function openPlayer(url){
  location.href = "player.html?url="+url;
}
</script>

</body>
</html>
