<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Netflix Style</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
}

/* MAIN LAYOUT */
#app{
display:flex;
height:100vh;
}

/* LEFT SIDEBAR */
#sidebar{
width:30%;
background:#111;
display:flex;
flex-direction:column;
}

#search{
margin:10px;
padding:10px;
border:none;
border-radius:6px;
}

/* CATEGORY ROWS */
#categories{
flex:1;
overflow-y:auto;
padding:10px;
}

.category{
margin-bottom:25px;
}

.category h3{
margin:10px 0;
font-size:14px;
color:#aaa;
}

/* HORIZONTAL SCROLL ROW */
.row{
display:flex;
overflow-x:auto;
gap:10px;
padding-bottom:10px;
scroll-behavior:smooth;
}

.card{
min-width:140px;
height:80px;
background:#222;
border-radius:10px;
padding:10px;
cursor:pointer;
flex-shrink:0;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
background:#333;
}

/* RIGHT PLAYER */
#player{
flex:1;
background:black;
position:relative;
}

video{
width:100%;
height:100%;
}

/* FOCUS STYLE (TV FEEL) */
.focused{
outline:2px solid red;
transform:scale(1.1);
}

/* MOBILE */
@media(max-width:900px){
#app{flex-direction:column}
#sidebar{width:100%;height:45%}
#player{height:55%}
.card{min-width:120px}
}
</style>
</head>

<body>

<div id="app">

<!-- LEFT -->
<div id="sidebar">

<input id="search" placeholder="Search channels..." onkeyup="render()">

<div id="categories"></div>

</div>

<!-- RIGHT -->
<div id="player">
<video id="video" controls autoplay playsinline></video>
</div>

</div>

<script>

// CDN M3U
const PLAYLIST_URL = "https://cdn.jsdelivr.net/gh/nayeemhossainbd/IPTV-MASTER-OTT@main/channels.m3u";

let channels = [];

// LOAD
async function load(){

let res = await fetch(PLAYLIST_URL);
let text = await res.text();

channels = parseM3U(text);

render();

play(channels[0]);

}

load();

// PARSE M3U
function parseM3U(data){
let lines = data.split("\n");
let arr = [];
let name="", group="Live TV";

for(let l of lines){

l = l.trim();

if(l.startsWith("#EXTINF")){
name = l.split(",")[1] || "Unknown";
let g = l.match(/group-title="(.*?)"/);
group = g ? g[1] : "Live TV";
}

else if(l && !l.startsWith("#")){
arr.push({name, group, url:l});
}

}

return arr;
}

// RENDER NETFLIX STYLE
function render(){

categories.innerHTML = "";

let s = search.value.toLowerCase();

let groups = {};

channels.forEach(c=>{
if(!c.name.toLowerCase().includes(s)) return;

if(!groups[c.group]) groups[c.group]=[];
groups[c.group].push(c);
});

for(let g in groups){

let cat = document.createElement("div");
cat.className="category";

cat.innerHTML = `<h3>${g}</h3>`;

let row = document.createElement("div");
row.className="row";

groups[g].forEach(c=>{

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<div style="font-weight:bold;font-size:13px">${c.name}</div>
<div style="font-size:11px;opacity:0.6">${c.group}</div>
`;

card.onclick = ()=> play(c);

row.appendChild(card);

});

cat.appendChild(row);
categories.appendChild(cat);

}

}

// PLAY
function play(c){

if(Hls.isSupported()){
let h = new Hls();
h.loadSource(c.url);
h.attachMedia(video);
}else{
video.src = c.url;
}

}

</script>

</body>
</html>
