<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{padding:10px;background:#111;display:flex;justify-content:space-between}
button{background:red;color:#fff;border:none;padding:6px 12px;border-radius:6px}
video{width:100%;height:auto;max-height:90vh;background:#000}
</style>
</head>

<body>

<header>
  <div>Player</div>
  <button onclick="back()">Back</button>
</header>

<video id="video" controls autoplay></video>

<script>
const url = new URLSearchParams(location.search).get("url");
const video = document.getElementById("video");

function play(u){
  u = decodeURIComponent(u);

  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(u);
    hls.attachMedia(video);
  } else {
    video.src = u;
  }
}

play(url);

function back(){
  location.href = "index.html";
}
</script>

</body>
</html>
